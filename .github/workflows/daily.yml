name: Daily arXiv Ingest

on:
  schedule:
    - cron: '0 1 * * 1-5'   # Mon–Fri UTC 01:00 (JST 10:00)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Fetch papers from last N days (leave blank to use config)'
        default: ''
        required: false
      summarize:
        description: 'Auto-fill evidence files via Claude API (requires ANTHROPIC_API_KEY secret)'
        type: boolean
        default: false
      quartz:
        description: 'Output Quartz-compatible files and push to PAPER_SURVEY_REPO'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout arxiv-ingest
        uses: actions/checkout@v4

      # --- 3-layer wiki (quartz=false, WIKI_REPO must be set) ---
      - name: Checkout research-wiki
        if: ${{ inputs.quartz != true && vars.WIKI_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.WIKI_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: research-wiki

      # --- Quartz site (quartz=true, PAPER_SURVEY_REPO must be set) ---
      - name: Checkout paper-survey
        if: ${{ inputs.quartz == true && vars.PAPER_SURVEY_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PAPER_SURVEY_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: paper-survey

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          if [ "${{ inputs.summarize }}" = "true" ]; then
            uv sync --extra summarize
          else
            uv sync
          fi

      - name: Point config at target wiki
        run: |
          python -c "
          import yaml, pathlib, os
          p = pathlib.Path('config.yaml')
          cfg = yaml.safe_load(p.read_text())
          if '${{ inputs.quartz }}' == 'true' and os.path.isdir('paper-survey'):
            cfg['output_dir'] = 'paper-survey'
          elif os.path.isdir('research-wiki'):
            cfg['output_dir'] = 'research-wiki'
          p.write_text(yaml.dump(cfg, allow_unicode=True))
          "

      - name: Fetch papers from arXiv
        run: |
          if [ -n "${{ inputs.days_back }}" ]; then
            SINCE=$(date -d "${{ inputs.days_back }} days ago" +%Y-%m-%d)
            uv run arxiv-ingest fetch --since="${SINCE}"
          else
            uv run arxiv-ingest fetch
          fi

      - name: Generate wiki files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          [ "${{ inputs.quartz }}" = "true" ] && FLAGS="$FLAGS --quartz"
          [ "${{ inputs.summarize }}" = "true" ] && FLAGS="$FLAGS --summarize"
          uv run arxiv-ingest generate $FLAGS

      # --- Commit to research-wiki (quartz=false) ---
      - name: Commit to research-wiki
        if: ${{ inputs.quartz != true && vars.WIKI_REPO != '' }}
        working-directory: research-wiki
        run: |
          git config user.name "arxiv-ingest[bot]"
          git config user.email "arxiv-ingest@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new papers to commit."
          else
            COUNT=$(git diff --staged --name-only | grep '^sources/' | wc -l | tr -d ' ')
            git commit -m "auto: arXiv ingest $(date +%Y-%m-%d) [${COUNT} papers]"
            git push
          fi

      # --- Commit to paper-survey (quartz=true) ---
      - name: Commit to paper-survey
        if: ${{ inputs.quartz == true && vars.PAPER_SURVEY_REPO != '' }}
        working-directory: paper-survey
        run: |
          git config user.name "arxiv-ingest[bot]"
          git config user.email "arxiv-ingest@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new papers to commit."
          else
            COUNT=$(git diff --staged --name-only | grep '^content/papers/' | wc -l | tr -d ' ')
            git commit -m "auto: arXiv ingest $(date +%Y-%m-%d) [${COUNT} papers]"
            git push
          fi
